<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Mencegah user zooming agar terasa seperti aplikasi native -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aplikasi GAS PWA</title>
  
  <!-- Link ke Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  
  <!-- PWA iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GAS App">
  
  <style>
    /* CSS Reset untuk fullscreen Iframe */
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; /* Mencegah pull-to-refresh bawaan browser */
      background-color: #f4f7f6;
    }
    
    /* Splash Screen Loader (Visual Effect) */
    #loader {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: sans-serif;
      color: #007bff;
      font-weight: bold;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      position: absolute;
      top: 0; left: 0;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

  <!-- Loading Screen sebelum iframe dari GAS siap -->
  <div id="loader">Memuat Aplikasi...</div>

  <!-- 
    ========================================================
    GANTI atribut 'src' DI BAWAH DENGAN URL WEB APP GAS KAMU 
    ========================================================
  -->
  <iframe 
    id="gasFrame"
    src="https://script.google.com/macros/s/AKfycbw53KpCxZusvLecc1ogP4qgSOqDIXFoCRKupeTj3dyXJXH7DkjqJ61yxop82rY_4VBK/exec" 
    allow="geolocation; camera; microphone"
    onload="document.getElementById('gasFrame').style.opacity = '1'; document.getElementById('loader').style.opacity = '0';">
  </iframe>

  <script>
    // Pendaftaran Service Worker agar bisa diinstal menjadi PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ZettBOT: ServiceWorker sukses terdaftar dengan scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ZettBOT: ServiceWorker gagal terdaftar: ', err);
          });
      });
    }
  </script>
</body>
</html>
