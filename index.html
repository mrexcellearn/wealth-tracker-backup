<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Excellearn Wealth Tracker</title>
  
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Excellearn">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #f1f5f9; font-family: 'Inter', sans-serif;}
    
    #loaderOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffffff; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #gasFrame {
      width: 100%; height: 100%; border: none; 
      position: absolute; top: 0; left: 0;
      z-index: 20; opacity: 0;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>

  <div id="loaderOverlay">
    <i class="fas fa-circle-notch fa-spin text-3xl text-orange-600 mb-3"></i>
    <p class="text-xs font-medium text-slate-600" id="loaderText">Membuka Excellearn...</p>
  </div>

  <iframe 
    id="gasFrame"
    src="https://script.google.com/macros/s/AKfycbw53KpCxZusvLecc1ogP4qgSOqDIXFoCRKupeTj3dyXJXH7DkjqJ61yxop82rY_4VBK/exec" 
    allow="geolocation; camera; microphone"
    onload="hideLoader()">
  </iframe>

  <script>
    let isLoaded = false;
    
    function hideLoader() {
      if(isLoaded) return; 
      isLoaded = true;
      
      const frame = document.getElementById('gasFrame');
      frame.style.opacity = '1'; 
      const loader = document.getElementById('loaderOverlay');
      loader.style.opacity = '0';
      
      // ZettBOT FIX: Pindahkan fokus ke dalam iframe agar tidak perlu klik layar dulu
      frame.focus();

      setTimeout(() => { loader.style.visibility = 'hidden'; }, 400);
    }

    // ==========================================
    // ZETTBOT: IFRAME COMMUNICATION INTERCOM
    // ==========================================

    // 1. Meneruskan Shortcut Keyboard (Ctrl+K) ke dalam Iframe
    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        const frame = document.getElementById('gasFrame');
        if (frame && frame.contentWindow) {
          // Kirim sinyal 'toggleAI' ke Google Apps Script
          frame.contentWindow.postMessage('toggleAI', '*');
        }
      }
    });

    // 2. Mencegah Swipe Back / Tombol Back Android menutup PWA
    // Kita buat "History Dummy" agar sistem mendeteksi masih ada halaman sebelumnya
    history.pushState({ page: 'wrapper' }, '', '');

    window.addEventListener('popstate', (e) => {
      const frame = document.getElementById('gasFrame');
      if (frame && frame.contentWindow) {
        // Kirim sinyal 'goBack' ke Google Apps Script agar dia menutup modal/tab di dalamnya
        frame.contentWindow.postMessage('goBack', '*');
      }
      // Dorong lagi History Dummy agar PWA tidak tertutup pada klik back selanjutnya
      history.pushState({ page: 'wrapper' }, '', '');
    });

  </script>
</body>
</html>
